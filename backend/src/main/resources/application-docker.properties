server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:db}:${POSTGRES_PORT:5432}/${POSTGRES_DB:orderdb}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true

spring.h2.console.enabled=false

jwt.secret=${JWT_SECRET:docker-secret-key-for-jwt-token-generation-and-validation-that-is-long-enough-for-production}
